<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Resume Analyzer | JobNova AI</title>

    <link rel="stylesheet" href="../style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">

    <img
        src="../assets/logo/jobnova-logo.png"
        alt="JobNova AI"
        class="jobnova-logo"
    >

</div>

        <a href="../index.html" class="login-btn">

            ← Back to Home

        </a>

    </nav>

</header>

<section class="resume-page">

    <div class="resume-container">

        <h1>📄 Resume Analyzer</h1>

        <p>
            Upload your resume and receive an AI-powered summary generated by JobNova AI.
        </p>

        <div class="resume-dashboard">

            <div class="upload-box">

                <div class="upload-icon">☁️</div>

                <h3>Upload Resume</h3>

                <p>Select your PDF resume</p>

                <input
                    type="file"
                    id="resumeFile"
                    accept=".pdf"
                >

                <br><br>
<textarea
    id="jobDescription"
    placeholder="Paste Job Description Here..."
    rows="6"
    style="
        width:100%;
        padding:10px;
        margin-top:15px;
        border-radius:10px;
    "
></textarea>

<br><br>
                <button
                    class="primary-btn"
                    id="analyzeBtn"
                >
                    Analyze Resume
                </button>

            </div>

            <div class="result-card">

                <div
                    id="loading"
                    class="loading-box"
                    style="display:none;"
                >

                    <div class="loader"></div>

                    <p>Analyzing Resume with AI...</p>

                </div>

                <h2>AI Resume Summary</h2>

                <div id="result">

                    Upload a resume and click Analyze.

                </div>

            </div>

        </div>

    </div>

</section>

<script src="../js/resume.js"></script>

</body>

</html>
